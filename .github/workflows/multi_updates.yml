name: Scheduled 5L2F Dashboard Factory

on:
  schedule:
    # KST 16:00 평일(월~금) -> 국내증시(KOSPI) + 리츠
    # UTC 07:00에 KST로는 같은 날 16:00이 되므로(자정을 안 넘음) 요일 보정이 필요 없습니다.
    - cron: '0 7 * * 1-5'
    # KST 07:00 평일(월~금) -> 미국시장 + 서울부동산 + 수도권부동산 + 통합대시보드 알림 (한 번에 실행)
    # 주의: UTC 저녁 시각은 KST로 넘어가면서 날짜가 하루 밀립니다. UTC 기준 '일~목'(0-4)에
    # 실행해야 KST로 '월~금' 아침이 됩니다. 예전에 '1-5'(월~금)로 잘못 넣어서 실제로는
    # KST 화~토 아침에 푸시되던 버그를 고쳤습니다.
    - cron: '0 22 * * 0-4'
  workflow_dispatch:
    inputs:
      mode:
        description: '수동 실행 시 강제 모드 (비워두면 all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - kospi_reits
          - all_morning
          - us_market
          - seoul_estate
          - gyeonggi_estate

permissions:
  contents: write

jobs:
  run-factory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests yfinance pandas

      # 기존 코드는 실행 시각(시/분)을 스스로 계산해서 모드를 추론했는데,
      # GitHub Actions 스케줄 큐가 지연되면(특히 정시 실행은 흔히 지연됨)
      # 분(minute) 경계값을 오판해서 엉뚱한 모드가 실행되는 문제가 있었습니다.
      # 아래는 "어떤 cron 표현식이 이 실행을 트리거했는지"를 GitHub이 알려주는
      # github.event.schedule 값을 그대로 모드에 매핑하므로, 실행이 늦게 시작되어도
      # 항상 의도한 모드가 정확히 실행됩니다.
      - name: Resolve run mode from trigger
        id: resolve_mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "0 7 * * 1-5")  echo "mode=kospi_reits" >> "$GITHUB_OUTPUT" ;;
              "0 22 * * 0-4") echo "mode=all_morning" >> "$GITHUB_OUTPUT" ;;
              *)              echo "mode=all" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Run Factory Scraper
        env:
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          MOLIT_API_KEY: ${{ secrets.MOLIT_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python dashboard_factory.py --mode ${{ steps.resolve_mode.outputs.mode }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.html stock_code_cache.json dart_corpcode_cache.json 2>/dev/null || git add *.html
          git diff-index --quiet HEAD || git commit -m "Auto-Update 5L2F Dashboards (${{ steps.resolve_mode.outputs.mode }})"
          git push origin HEAD:${{ github.ref_name }}

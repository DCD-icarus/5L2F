<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 · 5L2F</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
        .input {
            width: 100%; padding: 8px 12px; border-radius: 8px;
            border: 1px solid #d8c69c; background: #f7f1e3; color: #1c2f45; font-size: 13px;
        }
        .input:focus { outline: 2px solid #1f6d68; }
        .tab-btn { padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; color: #5f5340; cursor: pointer; }
        .tab-btn.active { background: #1f6d68; color: white; }
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
    <!-- Quill 리치텍스트 에디터 -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
</head>
<body class="bg-[#f7f1e3] text-[#1c2f45] min-h-screen">

    <header class="border-b border-[#d8c69c]/80 bg-[#efe4cd]/50 py-4">
        <div class="max-w-4xl mx-auto px-4 flex items-center justify-between">
            <h1 class="font-bold text-lg">5L2F 관리자</h1>
            <div id="auth-status" class="text-xs text-[#6b5f48]"></div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-10">

        <!-- 로그인 폼 -->
        <div id="login-box" class="bg-[#efe4cd]/60 border border-[#d8c69c] rounded-2xl p-8 max-w-sm mx-auto">
            <h2 class="font-bold text-base mb-4 text-center">관리자 로그인</h2>
            <input id="login-email" type="email" placeholder="이메일" class="input mb-3">
            <input id="login-password" type="password" placeholder="비밀번호" class="input mb-4">
            <button onclick="doLogin()" class="w-full bg-[#1e3a5f] hover:bg-[#153050] text-white font-bold text-sm py-2.5 rounded-lg">로그인</button>
            <p id="login-error" class="text-xs text-rose-500 mt-3 text-center"></p>
        </div>

        <!-- 관리자 화면 (로그인 후 표시) -->
        <div id="admin-panel" class="hidden">
            <div class="flex items-center justify-between mb-6">
                <div class="flex gap-2">
                    <button class="tab-btn active" data-tab="comments" onclick="switchAdminTab(this)">5L2F 생각</button>
                    <button class="tab-btn" data-tab="books" onclick="switchAdminTab(this)">Books</button>
                    <button class="tab-btn" data-tab="videos" onclick="switchAdminTab(this)">Video</button>
                </div>
                <button onclick="doLogout()" class="text-xs text-rose-500 font-bold hover:underline">로그아웃</button>
            </div>

            <!-- 5L2F 생각 작성 -->
            <div id="panel-comments" class="panel active">
                <div class="bg-[#efe4cd]/60 border border-[#d8c69c] rounded-2xl p-6 mb-6">
                    <h3 class="font-bold text-sm mb-4">새 글 작성</h3>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <select id="c-category" class="input">
                            <option value="국내">국내</option>
                            <option value="해외">해외</option>
                            <option value="부동산" selected>부동산</option>
                            <option value="기타">기타</option>
                        </select>
                        <input id="c-tags" class="input" placeholder="태그 (콤마로 구분)">
                    </div>
                    <input id="c-title" class="input mb-3" placeholder="제목">
                    <textarea id="c-summary" class="input mb-3" rows="2" placeholder="요약 (목록에 항상 보임)"></textarea>
                    <label class="text-xs font-bold text-[#5f5340] block mb-1">전문 (전문 보기 클릭 시 표시)</label>
                    <div id="c-body-editor" style="background:#f7f1e3; border-radius: 0 0 8px 8px;"></div>
                    <div class="mb-4"></div>
                    <input type="hidden" id="c-edit-id" value="">
                    <button id="c-submit-btn" onclick="submitComment()" class="bg-[#1f6d68] hover:bg-[#175551] text-white font-bold text-sm px-5 py-2.5 rounded-lg">게시하기</button>
                    <button id="c-cancel-btn" onclick="cancelEdit('comments')" class="hidden text-xs text-[#6b5f48] font-bold ml-2 hover:underline">수정 취소</button>
                    <span id="c-status" class="text-xs ml-3"></span>
                </div>
                <div id="comments-list" class="space-y-2"></div>
            </div>

            <!-- Books 작성 -->
            <div id="panel-books" class="panel">
                <div class="bg-[#efe4cd]/60 border border-[#d8c69c] rounded-2xl p-6 mb-6">
                    <h3 class="font-bold text-sm mb-4">새 책 추가</h3>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <input id="b-title" class="input" placeholder="제목">
                        <input id="b-author" class="input" placeholder="저자">
                        <input id="b-publisher" class="input" placeholder="출판사 · 출간년도">
                        <input id="b-cover" class="input" placeholder="표지 이미지 URL (선택)">
                        <select id="b-category" class="input">
                            <option value="주식">주식</option>
                            <option value="부동산">부동산</option>
                            <option value="경제일반">경제일반</option>
                        </select>
                        <select id="b-level" class="input">
                            <option value="입문">입문</option>
                            <option value="중급">중급</option>
                            <option value="고급">고급</option>
                        </select>
                        <input id="b-tags" class="input" placeholder="태그 (콤마로 구분)">
                        <input id="b-buylink" class="input" placeholder="구매 링크 (2개면 | 로 구분: 쿠팡|알라딘)">
                    </div>
                    <input id="b-oneliner" class="input mb-3" placeholder="핵심 한 줄 (카드 상단에 인용구로 표시)">
                    <textarea id="b-description" class="input mb-3" rows="3" placeholder="짧은 소개 (카드에 항상 보임, 2~4문장)"></textarea>
                    <label class="text-xs font-bold text-[#5f5340] block mb-1">서평 (선택 · '서평 읽어보기' 클릭 시 표시)</label>
                    <textarea id="b-review" class="input mb-1" rows="8" placeholder="빈 줄로 문단을 구분하세요. '추천: ...'으로 시작하는 줄은 '이런 분께' 박스로 표시됩니다."></textarea>
                    <p class="text-[10px] text-[#6b5f48] mb-4">빈 줄 = 문단 구분 · "추천:"으로 시작하는 줄 = 추천 대상 박스</p>
                    <input type="hidden" id="b-edit-id" value="">
                    <button id="b-submit-btn" onclick="submitBook()" class="bg-[#1f6d68] hover:bg-[#175551] text-white font-bold text-sm px-5 py-2.5 rounded-lg">추가하기</button>
                    <button id="b-cancel-btn" onclick="cancelEdit('books')" class="hidden text-xs text-[#6b5f48] font-bold ml-2 hover:underline">수정 취소</button>
                    <span id="b-status" class="text-xs ml-3"></span>
                </div>
                <div id="books-list" class="space-y-2"></div>
            </div>

            <!-- Video 작성 -->
            <div id="panel-videos" class="panel">
                <div class="bg-[#efe4cd]/60 border border-[#d8c69c] rounded-2xl p-6 mb-6">
                    <h3 class="font-bold text-sm mb-4">새 영상 추가</h3>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <input id="v-title" class="input" placeholder="제목">
                        <input id="v-channel" class="input" placeholder="채널명">
                        <input id="v-youtube" class="input col-span-2" placeholder="유튜브 URL (전체 주소 붙여넣기)">
                    </div>
                    <textarea id="v-description" class="input mb-4" rows="2" placeholder="추천 이유"></textarea>
                    <input type="hidden" id="v-edit-id" value="">
                    <button id="v-submit-btn" onclick="submitVideo()" class="bg-[#1f6d68] hover:bg-[#175551] text-white font-bold text-sm px-5 py-2.5 rounded-lg">추가하기</button>
                    <button id="v-cancel-btn" onclick="cancelEdit('videos')" class="hidden text-xs text-[#6b5f48] font-bold ml-2 hover:underline">수정 취소</button>
                    <span id="v-status" class="text-xs ml-3"></span>
                </div>
                <div id="videos-list" class="space-y-2"></div>
            </div>
        </div>
    </main>

    <script>
        function doLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            document.getElementById('login-error').innerText = '';
            auth.signInWithEmailAndPassword(email, password).catch(err => {
                document.getElementById('login-error').innerText = '로그인 실패: ' + err.message;
            });
        }

        function doLogout() {
            auth.signOut();
        }

        // 리치텍스트 에디터: 글자크기/색상/볼드·이탤릭·밑줄/폰트 지원
        const Font = Quill.import('formats/font');
        Font.whitelist = ['sans-serif', 'serif', 'monospace', 'georgia'];
        Quill.register(Font, true);

        const quillBody = new Quill('#c-body-editor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ font: Font.whitelist }],
                    [{ size: ['small', false, 'large', 'huge'] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ color: [] }, { background: [] }],
                    [{ align: [] }],
                    [{ list: 'ordered' }, { list: 'bullet' }],
                    ['blockquote', 'link'],
                    ['clean'],
                ],
            },
            placeholder: '전문 내용을 작성하세요...',
        });

        auth.onAuthStateChanged(user => {
            const statusEl = document.getElementById('auth-status');
            if (user) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                statusEl.innerText = user.email;
                loadAllLists();
            } else {
                document.getElementById('login-box').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
                statusEl.innerText = '';
            }
        });

        function switchAdminTab(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
        }

        function extractYoutubeId(url) {
            const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([a-zA-Z0-9_-]{11})/);
            return m ? m[1] : '';
        }

        function todayStr() {
            return new Date().toISOString().slice(0, 10);
        }

        // 항목별 원본 데이터 캐시 (수정 버튼 클릭 시 폼에 값 채우는 용도)
        window._itemCache = { comments: {}, books: {}, videos: {} };

        function cancelEdit(collection) {
            if (collection === 'comments') {
                document.getElementById('c-edit-id').value = '';
                document.getElementById('c-submit-btn').innerText = '게시하기';
                document.getElementById('c-cancel-btn').classList.add('hidden');
                ['c-title','c-summary','c-tags'].forEach(id => document.getElementById(id).value = '');
                quillBody.setContents([]);
            } else if (collection === 'books') {
                document.getElementById('b-edit-id').value = '';
                document.getElementById('b-submit-btn').innerText = '추가하기';
                document.getElementById('b-cancel-btn').classList.add('hidden');
                ['b-title','b-author','b-publisher','b-cover','b-tags','b-buylink','b-oneliner','b-description','b-review'].forEach(id => document.getElementById(id).value = '');
            } else if (collection === 'videos') {
                document.getElementById('v-edit-id').value = '';
                document.getElementById('v-submit-btn').innerText = '추가하기';
                document.getElementById('v-cancel-btn').classList.add('hidden');
                ['v-title','v-channel','v-youtube','v-description'].forEach(id => document.getElementById(id).value = '');
            }
        }

        function editItem(collection, id) {
            const d = window._itemCache[collection][id];
            if (!d) return;
            if (collection === 'comments') {
                document.getElementById('c-edit-id').value = id;
                document.getElementById('c-title').value = d.title || '';
                document.getElementById('c-summary').value = d.summary || '';
                document.getElementById('c-tags').value = (d.tags || []).join(', ');
                document.getElementById('c-category').value = d.category || '부동산';
                quillBody.root.innerHTML = d.bodyFormat === 'html' ? (d.body || '') : (d.body || '').replace(/\n/g, '<br>');
                document.getElementById('c-submit-btn').innerText = '수정 완료';
                document.getElementById('c-cancel-btn').classList.remove('hidden');
                document.querySelector('[data-tab="comments"]').click();
            } else if (collection === 'books') {
                document.getElementById('b-edit-id').value = id;
                document.getElementById('b-title').value = d.title || '';
                document.getElementById('b-author').value = d.author || '';
                document.getElementById('b-publisher').value = d.publisher || '';
                document.getElementById('b-cover').value = d.cover || '';
                document.getElementById('b-category').value = d.category || '주식';
                document.getElementById('b-level').value = d.level || '입문';
                document.getElementById('b-tags').value = (d.tags || []).join(', ');
                document.getElementById('b-buylink').value = d.buyLink || '';
                document.getElementById('b-oneliner').value = d.oneliner || '';
                document.getElementById('b-description').value = d.description || '';
                document.getElementById('b-review').value = d.review || '';
                document.getElementById('b-submit-btn').innerText = '수정 완료';
                document.getElementById('b-cancel-btn').classList.remove('hidden');
                document.querySelector('[data-tab="books"]').click();
            } else if (collection === 'videos') {
                document.getElementById('v-edit-id').value = id;
                document.getElementById('v-title').value = d.title || '';
                document.getElementById('v-channel').value = d.channel || '';
                document.getElementById('v-youtube').value = d.youtubeId ? `https://youtu.be/${d.youtubeId}` : '';
                document.getElementById('v-description').value = d.description || '';
                document.getElementById('v-submit-btn').innerText = '수정 완료';
                document.getElementById('v-cancel-btn').classList.remove('hidden');
                document.querySelector('[data-tab="videos"]').click();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function submitComment() {
            const status = document.getElementById('c-status');
            const editId = document.getElementById('c-edit-id').value;
            const title = document.getElementById('c-title').value.trim();
            const summary = document.getElementById('c-summary').value.trim();
            const body = quillBody.root.innerHTML;
            const isEmpty = quillBody.getText().trim().length === 0;
            if (!title || !summary || isEmpty) { status.innerText = '제목/요약/전문을 모두 입력해주세요.'; return; }
            const tags = document.getElementById('c-tags').value.split(',').map(t => t.trim()).filter(Boolean);
            const category = document.getElementById('c-category').value;
            try {
                if (editId) {
                    await db.collection('comments').doc(editId).update({ title, summary, body, tags, category, bodyFormat: 'html' });
                    status.innerText = '수정 완료!';
                    cancelEdit('comments');
                } else {
                    const now = new Date();
                    const datetime = now.toISOString().slice(0, 16).replace('T', ' ');
                    await db.collection('comments').add({
                        datetime, title, summary, body, tags, category,
                        bodyFormat: 'html',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    });
                    status.innerText = '게시 완료!';
                    ['c-title','c-summary','c-tags'].forEach(id => document.getElementById(id).value = '');
                    quillBody.setContents([]);
                }
                loadList('comments');
            } catch (e) { status.innerText = '오류: ' + e.message; }
        }

        async function submitBook() {
            const status = document.getElementById('b-status');
            const editId = document.getElementById('b-edit-id').value;
            const title = document.getElementById('b-title').value.trim();
            if (!title) { status.innerText = '제목을 입력해주세요.'; return; }
            const tags = document.getElementById('b-tags').value.split(',').map(t => t.trim()).filter(Boolean);
            const payload = {
                title,
                author: document.getElementById('b-author').value.trim(),
                publisher: document.getElementById('b-publisher').value.trim(),
                cover: document.getElementById('b-cover').value.trim(),
                category: document.getElementById('b-category').value,
                level: document.getElementById('b-level').value,
                oneliner: document.getElementById('b-oneliner').value.trim(),
                description: document.getElementById('b-description').value.trim(),
                review: document.getElementById('b-review').value,
                buyLink: document.getElementById('b-buylink').value.trim() || '#',
                tags,
            };
            try {
                if (editId) {
                    await db.collection('books').doc(editId).update(payload);
                    status.innerText = '수정 완료!';
                    cancelEdit('books');
                } else {
                    await db.collection('books').add({ ...payload, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    status.innerText = '추가 완료!';
                    ['b-title','b-author','b-publisher','b-cover','b-tags','b-buylink','b-oneliner','b-description','b-review'].forEach(id => document.getElementById(id).value = '');
                }
                loadList('books');
            } catch (e) { status.innerText = '오류: ' + e.message; }
        }

        async function submitVideo() {
            const status = document.getElementById('v-status');
            const editId = document.getElementById('v-edit-id').value;
            const title = document.getElementById('v-title').value.trim();
            const url = document.getElementById('v-youtube').value.trim();
            const youtubeId = extractYoutubeId(url);
            if (!title || !youtubeId) { status.innerText = '제목과 올바른 유튜브 URL을 입력해주세요.'; return; }
            const channel = document.getElementById('v-channel').value.trim();
            const description = document.getElementById('v-description').value.trim();
            try {
                if (editId) {
                    await db.collection('videos').doc(editId).update({ title, youtubeId, channel, description });
                    status.innerText = '수정 완료!';
                    cancelEdit('videos');
                } else {
                    await db.collection('videos').add({
                        title, youtubeId, channel, description,
                        dateAdded: todayStr(),
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    });
                    status.innerText = '추가 완료!';
                    ['v-title','v-channel','v-youtube','v-description'].forEach(id => document.getElementById(id).value = '');
                }
                loadList('videos');
            } catch (e) { status.innerText = '오류: ' + e.message; }
        }

        async function deleteItem(collection, id) {
            if (!confirm('삭제하시겠습니까?')) return;
            await db.collection(collection).doc(id).delete();
            loadList(collection);
        }

        async function loadList(collection) {
            const listEl = document.getElementById(collection + '-list');
            listEl.innerHTML = '<p class="text-xs text-[#6b5f48]">불러오는 중...</p>';
            const snap = await db.collection(collection).orderBy('createdAt', 'desc').get();
            if (snap.empty) { listEl.innerHTML = '<p class="text-xs text-[#6b5f48]">등록된 항목이 없습니다.</p>'; return; }
            listEl.innerHTML = '';
            window._itemCache[collection] = {};
            snap.forEach(doc => {
                const d = doc.data();
                window._itemCache[collection][doc.id] = d;
                const reviewBadge = (collection === 'books')
                    ? `<span class="text-[10px] ml-2 ${d.review && d.review.trim() ? 'text-[#1f6d68]' : 'text-[#b0a488]'}">${d.review && d.review.trim() ? '서평 있음' : '서평 없음'}</span>`
                    : '';
                listEl.innerHTML += `
                    <div class="flex items-center justify-between bg-[#f7f1e3]/60 border border-[#d8c69c] rounded-lg px-4 py-2.5">
                        <span class="text-xs font-semibold truncate">${d.title}${reviewBadge}</span>
                        <span class="shrink-0 flex items-center gap-3 ml-3">
                            <button onclick="editItem('${collection}','${doc.id}')" class="text-[10px] text-[#1f6d68] font-bold hover:underline">수정</button>
                            <button onclick="deleteItem('${collection}','${doc.id}')" class="text-[10px] text-rose-500 font-bold hover:underline">삭제</button>
                        </span>
                    </div>
                `;
            });
        }

        function loadAllLists() {
            loadList('comments');
            loadList('books');
            loadList('videos');
        }
    </script>
</body>
</html>
